<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PLC Manager — Setup</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@500;700&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg0: #0d0f11; --bg1: #141618; --bg2: #1c1f22;
      --border: #2e3236; --border2: #3d4246;
      --accent: #00c896; --accent2: #00a47a;
      --text0: #e8eaec; --text1: #9ba3ab; --text2: #5f6b74;
      --mono: 'Share Tech Mono', monospace;
      --sans: 'Barlow', sans-serif;
      --cond: 'Barlow Condensed', sans-serif;
    }
    body {
      background: var(--bg0);
      color: var(--text0);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
      pointer-events: none;
    }
    .setup-wrap {
      width: 420px;
      text-align: center;
    }
    .setup-logo {
      width: 64px; height: 64px;
      background: var(--accent);
      border-radius: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
    }
    .setup-logo svg { width: 34px; height: 34px; }
    h1 {
      font-family: var(--cond);
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }
    .sub {
      font-size: 13px;
      color: var(--text2);
      margin-bottom: 36px;
      font-family: var(--mono);
    }
    .form-box {
      background: var(--bg1);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 28px;
      text-align: left;
    }
    label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text2);
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text0);
      font-family: var(--mono);
      font-size: 15px;
      padding: 10px 12px;
      outline: none;
      margin-bottom: 20px;
      transition: border-color 0.15s;
    }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(0,200,150,0.12); }
    button {
      width: 100%;
      background: var(--accent);
      border: none;
      border-radius: 4px;
      color: #000;
      font-family: var(--cond);
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 12px;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: var(--accent2); }
    .hint {
      margin-top: 16px;
      font-size: 12px;
      color: var(--text2);
      text-align: center;
      font-family: var(--mono);
    }
  </style>
</head>
<body>
  <div class="setup-wrap">
    <div class="setup-logo">
      <svg viewBox="0 0 34 34" fill="none" stroke="#000" stroke-width="2">
        <rect x="3" y="3" width="28" height="28" rx="3"/>
        <line x1="10" y1="10" x2="10" y2="24"/>
        <line x1="17" y1="10" x2="17" y2="17"/>
        <line x1="24" y1="17" x2="24" y2="24"/>
        <circle cx="10" cy="10" r="2" fill="#000" stroke="none"/>
        <circle cx="17" cy="17" r="2" fill="#000" stroke="none"/>
        <circle cx="24" cy="24" r="2" fill="#000" stroke="none"/>
      </svg>
    </div>
    <h1>PLC Manager</h1>
    <p class="sub">Snap7 · Siemens · Raspberry Pi 4</p>

    <div class="form-box">
      <form method="POST" action="/setup">
        <label for="process_name">Process Name</label>
        <input type="text" id="process_name" name="process_name"
               placeholder="e.g. Bottling Line A" required autofocus
               value="{{ data.process_name or '' }}">
        <button type="submit">Initialize Process →</button>
      </form>
    </div>
    <p class="hint">This name identifies your industrial process throughout the application.</p>
  </div>
</body>
</html>
