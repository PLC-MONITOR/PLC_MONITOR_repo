<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}PLC Manager{% endblock %}</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@500;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg0: #0d0f11;
      --bg1: #141618;
      --bg2: #1c1f22;
      --bg3: #242729;
      --border: #2e3236;
      --border2: #3d4246;
      --accent: #00c896;
      --accent2: #00a47a;
      --warn: #f59e0b;
      --danger: #ef4444;
      --info: #3b82f6;
      --text0: #e8eaec;
      --text1: #9ba3ab;
      --text2: #5f6b74;
      --mono: 'Share Tech Mono', monospace;
      --sans: 'Barlow', sans-serif;
      --cond: 'Barlow Condensed', sans-serif;
    }

    body {
      background: var(--bg0);
      color: var(--text0);
      font-family: var(--sans);
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* Scanline overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
      pointer-events: none;
      z-index: 9999;
    }

    /* Nav */
    nav {
      background: var(--bg1);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 0;
      height: 52px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-right: 32px;
    }

    .nav-logo {
      width: 28px;
      height: 28px;
      background: var(--accent);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .nav-logo svg { width: 16px; height: 16px; }

    .nav-title {
      font-family: var(--cond);
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: var(--text0);
    }

    .nav-process {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 2px 8px;
      border-radius: 3px;
      margin-right: 24px;
    }

    .nav-links {
      display: flex;
      gap: 0;
      height: 100%;
      align-items: stretch;
    }

    .nav-link {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 18px;
      font-family: var(--cond);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text1);
      text-decoration: none;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }

    .nav-link:hover { color: var(--text0); }
    .nav-link.active { color: var(--accent); border-bottom-color: var(--accent); }

    .nav-status {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text2);
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* Main layout */
    main { padding: 28px 24px; max-width: 1200px; margin: 0 auto; }

    /* Section headers */
    .section-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .section-label {
      font-family: var(--cond);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text2);
    }

    .section-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Cards */
    .card {
      background: var(--bg1);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 20px;
      margin-bottom: 16px;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .card-title {
      font-family: var(--cond);
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    /* Form elements */
    .form-grid {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    }

    .form-field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .form-field.full { grid-column: 1 / -1; }

    label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text2);
    }

    input, select {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text0);
      font-family: var(--mono);
      font-size: 13px;
      padding: 8px 10px;
      outline: none;
      transition: border-color 0.15s;
      width: 100%;
    }

    input:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(0, 200, 150, 0.12);
    }

    input:disabled, select:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    select option { background: var(--bg2); }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 4px;
      border: 1px solid;
      font-family: var(--cond);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .btn-primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #000;
    }
    .btn-primary:hover { background: var(--accent2); border-color: var(--accent2); }

    .btn-ghost {
      background: transparent;
      border-color: var(--border2);
      color: var(--text1);
    }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

    .btn-danger {
      background: transparent;
      border-color: var(--danger);
      color: var(--danger);
    }
    .btn-danger:hover { background: rgba(239,68,68,0.1); }

    .btn-sm { padding: 5px 10px; font-size: 11px; }

    .btn svg { width: 14px; height: 14px; }

    /* Tags / badges */
    .badge {
      display: inline-block;
      font-family: var(--mono);
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 3px;
      letter-spacing: 0.05em;
    }

    .badge-area { background: rgba(59,130,246,0.15); color: #60a5fa; border: 1px solid rgba(59,130,246,0.3); }
    .badge-type { background: rgba(245,158,11,0.15); color: #fbbf24; border: 1px solid rgba(245,158,11,0.3); }
    .badge-ok   { background: rgba(0,200,150,0.12); color: var(--accent); border: 1px solid rgba(0,200,150,0.3); }
    .badge-err  { background: rgba(239,68,68,0.12); color: #f87171; border: 1px solid rgba(239,68,68,0.3); }

    /* Toast notifications */
    #toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 9998;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .toast {
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: 5px;
      padding: 10px 16px;
      font-size: 13px;
      min-width: 240px;
      animation: slideIn 0.2s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toast.success { border-left: 3px solid var(--accent); }
    .toast.error   { border-left: 3px solid var(--danger); }
    .toast.info    { border-left: 3px solid var(--info); }

    @keyframes slideIn {
      from { transform: translateX(20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body>

<nav>
  <div class="nav-brand">
    <div class="nav-logo">
      <svg viewBox="0 0 16 16" fill="none" stroke="#000" stroke-width="1.5">
        <rect x="2" y="2" width="12" height="12" rx="1"/>
        <line x1="5" y1="5" x2="5" y2="11"/>
        <line x1="8" y1="5" x2="8" y2="8"/>
        <line x1="11" y1="8" x2="11" y2="11"/>
      </svg>
    </div>
    <span class="nav-title">PLC Monitor</span>
  </div>

  {% if data.process_name %}
  <span class="nav-process">{{ data.process_name }}</span>
  {% endif %}

  <div class="nav-links">
    <a href="/config" class="nav-link {% if request.path == '/config' %}active{% endif %}">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" width="14" height="14">
        <circle cx="8" cy="8" r="2.5"/>
        <path d="M8 1v2M8 13v2M1 8h2M13 8h2"/>
      </svg>
      Configuration
    </a>
    <a href="/monitor" class="nav-link {% if request.path == '/monitor' %}active{% endif %}">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" width="14" height="14">
        <rect x="1" y="2" width="14" height="10" rx="1"/>
        <path d="M5 14h6M8 12v2"/>
        <polyline points="3,9 5,6 7,8 10,4 13,7"/>
      </svg>
      Monitor
    </a>
  </div>

  <div class="nav-status">
    <span class="status-dot"></span>
    SNAP7 READY
  </div>
</nav>

<main>
  {% block content %}{% endblock %}
</main>

<div id="toast-container"></div>

<script>
function toast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

async function api(method, url, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(url, opts);
  return res.json();
}
</script>

{% block scripts %}{% endblock %}
</body>
</html>
